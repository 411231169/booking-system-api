name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write # Dibutuhkan untuk membuat tag/release
  issues: write # (Opsional) untuk memberi komentar di issue
  pull-requests: write # (Opsional) untuk memberi komentar di PR

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Sangat penting agar semantic-release bisa membaca seluruh history commit
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24.15"
          
      - name: Install dependencies
        run: npm ci
          
      - name: Run Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
