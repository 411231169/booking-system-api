version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=futsal_user
      - DB_PASSWORD=futsal_password
      - DB_NAME=futsal_db
      - JWT_SECRET=production_secret_key_change_me
      - JWT_EXPIRES_IN=1d
    depends_on:
      db:
        condition: service_healthy
    networks:
      - futsal-network

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=futsal_db
      - MYSQL_USER=futsal_user
      - MYSQL_PASSWORD=futsal_password
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - futsal-network

volumes:
  db_data:

networks:
  futsal-network:
    driver: bridge
